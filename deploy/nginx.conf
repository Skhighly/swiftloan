# /etc/nginx/sites-available/swiftloan
# Handles TLS termination, HSTS, rate limiting, and proxying to Gunicorn

# ── Rate limit zones ──────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=login:10m     rate=5r/m;
limit_req_zone $binary_remote_addr zone=register:10m  rate=3r/m;
limit_req_zone $binary_remote_addr zone=apply:10m     rate=3r/m;
limit_req_zone $binary_remote_addr zone=general:10m   rate=60r/m;

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS server ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS (get free cert with: certbot --nginx -d yourdomain.com) ──────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # ── Static and media files (served directly by Nginx, not Django) ────────
    location /static/ {
        alias /home/swiftloan/app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /home/swiftloan/app/media/;
        # IMPORTANT: Block direct browser access to ID documents
        # Users should only see them through Django views, not direct URLs
        internal;
    }

    # ── Rate-limited routes ───────────────────────────────────────────────────
    location /accounts/login/ {
        limit_req zone=login burst=2 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/proxy_params;
    }

    location /accounts/register/ {
        limit_req zone=register burst=2 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/proxy_params;
    }

    location /loans/apply/ {
        limit_req zone=apply burst=1 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/proxy_params;
    }

    # ── M-Pesa callback: restrict to Safaricom IP ranges ─────────────────────
    location /payments/callback/ {
        # Safaricom Daraja production IP ranges (verify current list at developer.safaricom.co.ke)
        allow 196.201.214.0/24;
        allow 196.201.214.136/29;
        allow 196.201.212.0/23;
        deny all;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/proxy_params;
    }

    # ── All other routes ──────────────────────────────────────────────────────
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/proxy_params;
    }

    # ── Upload size limit (ID photos) ─────────────────────────────────────────
    client_max_body_size 10M;

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/swiftloan_access.log;
    error_log  /var/log/nginx/swiftloan_error.log;
}
